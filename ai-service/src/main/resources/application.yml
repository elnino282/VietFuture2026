server:
  port: ${SERVER_PORT:8083}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  application:
    name: ai-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8081/api/v1/auth/.well-known/jwks.json}
  ai:
    vectorstore:
      chroma:
        client:
          host: ${SPRING_AI_CHROMADB_STORE_URL:http://localhost:8000}
        collection-name: ${SPRING_AI_CHROMADB_STORE_COLLECTION_NAME:acm_knowledge}
        initialize-schema: true
    vertex:
      ai:
        gemini:
          project-id: dummy
          location: us-central1
          chat:
            options:
              model: gemini-1.5-flash
    googleai:
      api-key: ${GEMINI_API_KEY:dummy}
      chat:
        options:
          model: gemini-1.5-flash

jwt:
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

app:
  ai:
    baseUrl: ${APP_AI_BASE_URL:https://generativelanguage.googleapis.com}
    apiKey: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:gemini-2.5-flash}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4317}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
