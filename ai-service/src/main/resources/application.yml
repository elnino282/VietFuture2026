server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ai-service

jwt:
  signerKey: ${JWT_SIGNER_KEY:supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

app:
  ai:
    baseUrl: ${APP_AI_BASE_URL:https://generativelanguage.googleapis.com}
    apiKey: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:gemini-2.5-flash}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
