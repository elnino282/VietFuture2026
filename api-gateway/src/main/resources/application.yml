server:
  port: ${GATEWAY_PORT:8000}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: identity-route
              uri: ${IDENTITY_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**, /api/v1/user/**, /api/v1/preferences/**, /api/v1/admin/roles/**
            - id: crop-catalog-route
              uri: ${CROP_CATALOG_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/v1/crops/**, /api/v1/varieties/**, /api/v1/admin/varieties/**, /api/v1/admin/crops/**, /api/v1/catalog/**
            - id: ai-route
              uri: ${AI_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/v1/ai/qa, /api/v1/ai/qa/**, /api/v1/farmer/ai/chat, /api/v1/farmer/ai/chat/**, /api/v1/buyer/ai/chat, /api/v1/buyer/ai/chat/**
            - id: monolith-route
              uri: ${MONOLITH_URI:http://localhost:8080}
              predicates:
                - Path=/api/v1/**, /v3/api-docs/**, /swagger-ui/**, /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive.function.client.ExchangeFunctions: DEBUG
    org.example.apigateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [CorrelationID: %X{correlationId}] - %msg%n"
