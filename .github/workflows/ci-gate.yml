name: CI Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  frontend:
    name: Frontend (typecheck/lint/test/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agricultural-crop-management-frontend
    env:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_API_PROXY_TARGET: http://localhost:8080
      VITE_GOOGLE_MAPS_API_KEY: ci-placeholder
      VITE_WEATHER_API_KEY: ci-placeholder
      # Placeholder-only Firebase envs for build/test safety (no real secrets in CI).
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: ci-placeholder
      VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_APP_ID: "1:000000000000:web:ci-placeholder"
      VITE_FIREBASE_MEASUREMENT_ID: G-PLACEHOLDER
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agricultural-crop-management-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  backend:
    name: Backend (compile/test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agricultural-crop-management-backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quanlymuavu_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/quanlymuavu_ci?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASS: root
      JWT_SIGNER_KEY: ci_signer_key_please_rotate_if_reused
      MAIL_ENABLED: "false"
      APP_AI_API_KEY: ""
      # AI is deferred; placeholder only to avoid accidental secret dependency in CI.
      APP_AI_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Compile
        run: ./mvnw -q -DskipTests compile

      - name: Test (unit/integration/architecture)
        run: ./mvnw -q test

  backend-migration-validate:
    name: Backend (flyway validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agricultural-crop-management-backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quanlymuavu_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Flyway baseline (append-only starting point)
        run: >
          ./mvnw -q -DskipTests
          org.flywaydb:flyway-maven-plugin:11.7.2:baseline
          -Dflyway.url="jdbc:mysql://127.0.0.1:3306/quanlymuavu_ci"
          -Dflyway.user=root
          -Dflyway.password=root
          -Dflyway.locations=filesystem:src/main/resources/db/migration
          -Dflyway.schemas=quanlymuavu_ci
          -Dflyway.baselineVersion=13

      - name: Flyway validate
        run: >
          ./mvnw -q -DskipTests
          org.flywaydb:flyway-maven-plugin:11.7.2:validate
          -Dflyway.url="jdbc:mysql://127.0.0.1:3306/quanlymuavu_ci"
          -Dflyway.user=root
          -Dflyway.password=root
          -Dflyway.locations=filesystem:src/main/resources/db/migration
          -Dflyway.schemas=quanlymuavu_ci
          -Dflyway.ignoreMigrationPatterns=*:pending

  microservices:
    name: Microservice (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-service
          - api-gateway
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Test
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
            MVN_CMD="./mvnw"
          else
            MVN_CMD="mvn"
          fi

          $MVN_CMD -q test

  database-microservices:
    name: DB Microservice (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            database: identity_service_ci
          - service: crop-catalog-service
            database: crop_catalog_service_ci
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ${{ matrix.database }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/${{ matrix.database }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASS: root
      JWT_SIGNER_KEY: ci_signer_key_please_rotate_if_reused
      JWT_JWKS_URI: http://localhost:8081/api/v1/auth/.well-known/jwks.json
      MAIL_ENABLED: "false"
      APP_AI_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Test
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
            MVN_CMD="./mvnw"
          else
            MVN_CMD="mvn"
          fi

          $MVN_CMD -q test
