server:
  port: ${SERVER_PORT:8090}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  application:
    name: marketplace-service

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/marketplace_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:springuser}
    password: ${DB_PASS:springpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4317}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

external-services:
  farm-service-url: ${EXTERNAL_SERVICES_FARM_SERVICE_URL:http://farm-service:8084}
  season-service-url: ${EXTERNAL_SERVICES_SEASON_SERVICE_URL:http://season-service:8085}
  inventory-service-url: ${EXTERNAL_SERVICES_INVENTORY_SERVICE_URL:http://inventory-service:8086}
  identity-service-url: ${EXTERNAL_SERVICES_IDENTITY_SERVICE_URL:http://identity-service:8081}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    product-images: ${MINIO_BUCKET_PRODUCT_IMAGES:marketplace-product-images}
    payment-proofs: ${MINIO_BUCKET_PAYMENT_PROOFS:marketplace-payment-proofs}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
