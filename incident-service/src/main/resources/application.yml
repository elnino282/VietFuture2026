server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: incident-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/incident_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:springuser}
    password: ${DB_PASS:springpass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:rabbituser}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbitpass}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4317}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  identity-service-url: ${APP_IDENTITY_SERVICE_URL:http://identity-service:8081}
  farm-service-url: ${APP_FARM_SERVICE_URL:http://farm-service:8084}
  season-service-url: ${APP_SEASON_SERVICE_URL:http://season-service:8085}
