server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: season-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/season_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:springuser}
    password: ${DB_PASS:springpass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:rabbituser}
    password: ${SPRING_RABBITMQ_PASSWORD:rabbitpass}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  signerKey: ${JWT_SIGNER_KEY:supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  farm-service-url: ${APP_FARM_SERVICE_URL:http://localhost:8084}
  crop-catalog-service-url: ${APP_CROP_CATALOG_SERVICE_URL:http://localhost:8082}
  identity-service-url: ${APP_IDENTITY_SERVICE_URL:http://localhost:8081}
  monolith-service-url: ${APP_MONOLITH_SERVICE_URL:http://localhost:8080}
  inventory-service-url: ${APP_INVENTORY_SERVICE_URL:http://localhost:8086}


