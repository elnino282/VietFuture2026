# Test profile configuration for season-service
# Uses H2 in-memory database for fast, isolated testing

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Flyway for H2 tests (we use create-drop)
spring.flyway.enabled=false

# JWT Configuration (test values)
jwt.jwks-uri=http://localhost:8081/api/v1/auth/.well-known/jwks.json

# Disable RabbitMQ for tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Keep scheduled outbox/jobs from running while OpenAPI tests build an H2 schema.
spring.task.scheduling.enabled=false
