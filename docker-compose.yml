services:
  mysql:
    image: mysql:8.0
    container_name: mysql_quanlymuavu
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quanlymuavu}
      MYSQL_USER: ${MYSQL_USER:-springuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-springpass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog_quanlymuavu
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_quanlymuavu
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio_quanlymuavu
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./agricultural-crop-management-backend
      dockerfile: Dockerfile
    container_name: backend_quanlymuavu
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-quanlymuavu}
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_VALID_DURATION: ${JWT_VALID_DURATION:-3600}
      JWT_REFRESHABLE_DURATION: ${JWT_REFRESHABLE_DURATION:-36000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: false
      SMTP_STARTTLS: false
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-dummy_api_key_placeholder}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      # RabbitMQ configurations
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
      # MinIO storage configuration overrides
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_CROP_CATALOG_SERVICE_URL: http://crop-catalog-service:8082
      APP_AI_SERVICE_URL: http://ai-service:8083
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/identity_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_VALID_DURATION: ${JWT_VALID_DURATION:-3600}
      JWT_REFRESHABLE_DURATION: ${JWT_REFRESHABLE_DURATION:-36000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: false
      SMTP_STARTTLS: false
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      DEV_BOOTSTRAP_ADMIN_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy

  crop-catalog-service:
    build:
      context: ./crop-catalog-service
      dockerfile: Dockerfile
    container_name: crop_catalog_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/crop_catalog_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitpass}
      APP_BACKEND_URL: http://backend:8080
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai_service_quanlymuavu
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8083
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_AI_API_KEY: ${APP_AI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      - identity-service

  farm-service:
    build:
      context: ./farm-service
      dockerfile: Dockerfile
    container_name: farm_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8084
      DB_URL: jdbc:mysql://mysql:3306/farm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  season-service:
    build:
      context: ./season-service
      dockerfile: Dockerfile
    container_name: season_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8085
      DB_URL: jdbc:mysql://mysql:3306/season_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_FARM_SERVICE_URL: http://farm-service:8084
      APP_CROP_CATALOG_SERVICE_URL: http://crop-catalog-service:8082
      APP_IDENTITY_SERVICE_URL: http://identity-service:8081
      APP_INVENTORY_SERVICE_URL: http://inventory-service:8086
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      farm-service:
        condition: service_started

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8086
      DB_URL: jdbc:mysql://mysql:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: finance_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8087
      DB_URL: jdbc:mysql://mysql:3306/finance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_SEASON_SERVICE_URL: http://season-service:8085
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      season-service:
        condition: service_started

  incident-service:
    build:
      context: ./incident-service
      dockerfile: Dockerfile
    container_name: incident_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8088
      DB_URL: jdbc:mysql://mysql:3306/incident_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_SEASON_SERVICE_URL: http://season-service:8085
      APP_IDENTITY_SERVICE_URL: http://identity-service:8081
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      season-service:
        condition: service_started
      identity-service:
        condition: service_started

  sustainability-service:
    build:
      context: ./sustainability-service
      dockerfile: Dockerfile
    container_name: sustainability_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8089
      DB_URL: jdbc:mysql://mysql:3306/sustainability_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      APP_SEASON_SERVICE_URL: http://season-service:8085
      APP_FARM_SERVICE_URL: http://farm-service:8084
      APP_FINANCE_SERVICE_URL: http://finance-service:8087
      APP_INCIDENT_SERVICE_URL: http://incident-service:8088
      APP_CROP_CATALOG_SERVICE_URL: http://crop-catalog-service:8082
      APP_BACKEND_URL: http://backend:8080
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      season-service:
        condition: service_started
      farm-service:
        condition: service_started
      finance-service:
        condition: service_started
      incident-service:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_quanlymuavu
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PORT: 8000
      MONOLITH_URI: http://backend:8080
      IDENTITY_SERVICE_URI: http://identity-service:8081
      CROP_CATALOG_SERVICE_URI: http://crop-catalog-service:8082
      AI_SERVICE_URI: http://ai-service:8083
      FARM_SERVICE_URI: http://farm-service:8084
      SEASON_SERVICE_URI: http://season-service:8085
      INVENTORY_SERVICE_URI: http://inventory-service:8086
      FINANCE_SERVICE_URI: http://finance-service:8087
      INCIDENT_SERVICE_URI: http://incident-service:8088
      SUSTAINABILITY_SERVICE_URI: http://sustainability-service:8089
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      - backend
      - identity-service
      - crop-catalog-service
      - ai-service
      - farm-service
      - season-service
      - inventory-service
      - finance-service
      - incident-service
      - sustainability-service

  frontend:
    build:
      context: ./agricultural-crop-management-frontend
      dockerfile: Dockerfile
      args:
        # Route requests to Gateway (port 8000) instead of Backend directly
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: frontend_quanlymuavu
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_quanlymuavu
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_quanlymuavu
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  mysql_data:
  minio_data:
  rabbitmq_data:
