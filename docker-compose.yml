      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8084
      DB_URL: jdbc:mysql://mysql:3306/farm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "false"
