        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      season-service:
        condition: service_started
      farm-service:
        condition: service_started
      finance-service:
        condition: service_started
      incident-service:
        condition: service_started

  marketplace-service:
    build:
      context: ./marketplace-service
      dockerfile: Dockerfile
    container_name: marketplace_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8090
      DB_URL: jdbc:mysql://mysql:3306/marketplace_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      EXTERNAL_SERVICES_FARM_SERVICE_URL: http://farm-service:8084
      EXTERNAL_SERVICES_SEASON_SERVICE_URL: http://season-service:8085
      EXTERNAL_SERVICES_INVENTORY_SERVICE_URL: http://inventory-service:8086
      EXTERNAL_SERVICES_IDENTITY_SERVICE_URL: http://identity-service:8081
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_PRODUCT_IMAGES: marketplace-product-images
      MINIO_BUCKET_PAYMENT_PROOFS: marketplace-payment-proofs
      MINIO_PUBLIC_URL: http://localhost:9000
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started

  admin-reporting-service:
    build:
      context: ./admin-reporting-service
      dockerfile: Dockerfile
    container_name: admin_reporting_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8091
      DB_URL: jdbc:mysql://mysql:3306/admin_reporting_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
      BACKFILL_ENABLED: "true"
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_quanlymuavu
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      GATEWAY_PORT: 8080
      IDENTITY_SERVICE_URI: http://identity-service:8081
      CROP_CATALOG_SERVICE_URI: http://crop-catalog-service:8082
      AI_SERVICE_URI: http://ai-service:8083
      FARM_SERVICE_URI: http://farm-service:8084
      SEASON_SERVICE_URI: http://season-service:8085
      INVENTORY_SERVICE_URI: http://inventory-service:8086
      FINANCE_SERVICE_URI: http://finance-service:8087
      INCIDENT_SERVICE_URI: http://incident-service:8088
      SUSTAINABILITY_SERVICE_URI: http://sustainability-service:8089
      MARKETPLACE_SERVICE_URI: http://marketplace-service:8090
      ADMIN_REPORTING_SERVICE_URI: http://admin-reporting-service:8091
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "false"
    depends_on:
      - identity-service
      - crop-catalog-service
      - ai-service
      - farm-service
      - season-service
      - inventory-service
      - finance-service
      - incident-service
      - sustainability-service
      - marketplace-service
      - admin-reporting-service

