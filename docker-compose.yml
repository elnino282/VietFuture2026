  sustainability-service:
    build:
      context: ./sustainability-service
      dockerfile: Dockerfile
    container_name: sustainability_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8089
      DB_URL: jdbc:mysql://mysql:3306/sustainability_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
