services:
  mysql:
    image: mysql:8.0
    container_name: mysql_quanlymuavu
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quanlymuavu}
      MYSQL_USER: ${MYSQL_USER:-springuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-springpass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog_quanlymuavu
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_quanlymuavu
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio_quanlymuavu
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./agricultural-crop-management-backend
      dockerfile: Dockerfile
    container_name: backend_quanlymuavu
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-quanlymuavu}
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_JWKS_URI: http://identity-service:8081/api/v1/auth/.well-known/jwks.json
      JWT_VALID_DURATION: ${JWT_VALID_DURATION:-3600}
      JWT_REFRESHABLE_DURATION: ${JWT_REFRESHABLE_DURATION:-36000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: false
      SMTP_STARTTLS: false
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-dummy_api_key_placeholder}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      # RabbitMQ configurations
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-rabbituser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-rabbitpass}
      # MinIO storage configuration overrides
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity_service_quanlymuavu
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/identity_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: ${MYSQL_USER:-springuser}
      DB_PASS: ${MYSQL_PASSWORD:-springpass}
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-supersecretkeyplaceholder64characterslongmustbe64byteslongforhs512!}
      JWT_VALID_DURATION: ${JWT_VALID_DURATION:-3600}
      JWT_REFRESHABLE_DURATION: ${JWT_REFRESHABLE_DURATION:-36000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_AUTH: false
      SMTP_STARTTLS: false
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8000}
      DEV_BOOTSTRAP_ADMIN_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway_quanlymuavu
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PORT: 8000
      MONOLITH_URI: http://backend:8080
      IDENTITY_SERVICE_URI: http://identity-service:8081
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      - backend
      - identity-service

  frontend:
    build:
      context: ./agricultural-crop-management-frontend
      dockerfile: Dockerfile
      args:
        # Route requests to Gateway (port 8000) instead of Backend directly
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: frontend_quanlymuavu
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_quanlymuavu
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_quanlymuavu
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  mysql_data:
  minio_data:
  rabbitmq_data:
