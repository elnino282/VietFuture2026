server:
  port: ${SERVER_PORT:8091}

spring:
  application:
    name: admin-reporting-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/admin_reporting_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:springuser}
    password: ${DB_PASS:springpass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  jwks-uri: ${JWT_JWKS_URI:http://identity-service:8081/api/v1/auth/.well-known/jwks.json}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

admin-reporting:
  backfill:
    enabled: ${BACKFILL_ENABLED:true}
