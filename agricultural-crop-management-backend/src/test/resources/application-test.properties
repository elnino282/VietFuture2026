# Test profile configuration for integration tests
# Uses H2 in-memory database for fast, isolated testing

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (test values)
jwt.signerKey=test-signer-key-for-integration-tests-must-be-at-least-64-characters-long-placeholder!
jwt.jwks-uri=http://localhost:8081/api/v1/auth/.well-known/jwks.json
jwt.valid-duration=3600
jwt.refreshable-duration=36000

# Disable external services for tests
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=1025

# Firebase (optional for tests)
app.firebase.enabled=false

# AI Service (optional for tests)
app.ai.enabled=false

# Logging
logging.level.org.example.QuanLyMuaVu=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
