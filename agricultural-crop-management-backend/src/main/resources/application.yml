spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  mail:
    properties:
      mail:
        smtp:
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SMTP_TIMEOUT:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:5000}

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

farm:
  security:
    trust-proxy-headers: false
    trusted-proxy-ips: []

app:
  sustainability:
    threshold-source: config_default_v1
    alerts:
      low-max-exclusive: 40
      medium-max-exclusive: 70
      mineral-high-min: 60
    score-weights:
      dependency: 0.30
      efficiency: 0.25
      productivity: 0.20
      risk: 0.15
      confidence: 0.10
    estimation:
      atmospheric-deposition-kg-per-ha: 8
      irrigation-water-kg-per-ha-per-event: 1.2
      legume-fixation-kg-per-ha: 35
      mineral-fertilizer-n-ratio: 0.18
      organic-fertilizer-n-ratio: 0.06
      default-crop-n-content-kg-per-kg-yield: 0.012
      strong-action-min-confidence: 0.60
      strong-action-min-nue: 45
    legacy-backfill:
      enabled: false
      dry-run: true
      season-id:
      from-date:
      to-date:
      sample-limit: 50
