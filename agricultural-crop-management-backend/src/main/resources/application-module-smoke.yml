spring:
  config:
    activate:
      on-profile: module-smoke
  main:
    lazy-initialization: true
  flyway:
    enabled: false
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

jwt:
  signerKey: module-smoke-signing-key-2026-module-smoke

app:
  mail:
    enabled: false

module:
  smoke:
    enabled: true
    target: all
    modules:
      ai: false
      cropcatalog: false
      inventory: false
