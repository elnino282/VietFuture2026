components:
  schemas:
    CreateSoilTestRequest:
      type: object
      properties:
        plotId:
          type: integer
          format: int32
        sampleDate:
          type: string
          format: date
        soilOrganicMatterPct:
          type: number
          maximum: 100.0
          minimum: 0.0
        mineralNKgPerHa:
          type: number
          minimum: 0.0
        nitrateMgPerKg:
          type: number
          minimum: 0.0
        ammoniumMgPerKg:
          type: number
          minimum: 0.0
        sourceType:
          type: string
          enum:
          - user_entered
          - lab_measured
          - system_estimated
          - external_reference
          - default_reference
        sourceDocument:
          type: string
        labReference:
          type: string
        note:
          type: string
      required:
      - mineralNKgPerHa
      - plotId
      - sampleDate
      - sourceType
    ApiResponseSoilTestResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          $ref: "#/components/schemas/SoilTestResponse"
        data:
          $ref: "#/components/schemas/SoilTestResponse"
        generatedAt:
          type: string
