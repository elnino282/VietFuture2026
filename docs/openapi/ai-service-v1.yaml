openapi: 3.1.0
info:
  title: ACM AI Service API
  description: API documentation for ACM AI Service
  license:
    name: Apache 2.0
    url: https://springdoc.org
  version: 1.0.0
servers:
- url: http://localhost
  description: Generated server url
security:
- bearerAuth: []
paths:
  /api/v1/internal/ai/buyer-expert:
    post:
      tags:
      - ai-controller
      operationId: chatAsBuyerProcurementExpert
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalBuyerExpertRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/internal/ai/analyze-image:
    post:
      tags:
      - ai-controller
      operationId: analyzeMarketplaceImage
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalImageAnalysisRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/internal/ai/agricultural-expert:
    post:
      tags:
      - ai-controller
      operationId: chatAsAgriculturalExpert
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalAgriExpertRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/farmer/ai/chat:
    post:
      tags:
      - chat-controller
      operationId: chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseChatResponse"
  /api/v1/buyer/ai/chat:
    post:
      tags:
      - chat-controller
      operationId: buyerChat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyerChatRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseBuyerChatResponse"
  /api/v1/ai/qa:
    get:
      tags:
      - ai-controller
      operationId: qa
      parameters:
      - name: question
        in: query
        required: true
        schema:
          type: string
      - name: context
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseMapStringObject"
components:
  schemas:
    InternalBuyerExpertRequest:
      type: object
      properties:
        userMessage:
          type: string
        buyerContext:
          type: string
    ApiResponseString:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          type: string
        data:
          type: string
        generatedAt:
          type: string
    InternalImageAnalysisRequest:
      type: object
      properties:
        imageBytesBase64:
          type: string
        mimeType:
          type: string
    InternalAgriExpertRequest:
      type: object
      properties:
        userMessage:
          type: string
        cropContext:
          type: string
    ChatRequest:
      type: object
      properties:
        userMessage:
          type: string
        cropContext:
          type: string
      required:
      - userMessage
    ApiResponseChatResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          $ref: "#/components/schemas/ChatResponse"
        data:
          $ref: "#/components/schemas/ChatResponse"
        generatedAt:
          type: string
    ChatResponse:
      type: object
      properties:
        userMessage:
          type: string
        cropContext:
          type: string
        assistantMessage:
          type: string
    BuyerChatRequest:
      type: object
      properties:
        userMessage:
          type: string
        buyerContext:
          type: string
      required:
      - userMessage
    ApiResponseBuyerChatResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          $ref: "#/components/schemas/BuyerChatResponse"
        data:
          $ref: "#/components/schemas/BuyerChatResponse"
        generatedAt:
          type: string
    BuyerChatResponse:
      type: object
      properties:
        userMessage:
          type: string
        buyerContext:
          type: string
        assistantMessage:
          type: string
    ApiResponseMapStringObject:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          type: object
          additionalProperties:
            type: object
        data:
          type: object
          additionalProperties:
            type: object
        generatedAt:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      name: bearerAuth
      scheme: bearer
      bearerFormat: JWT
