openapi: 3.1.0
info:
  title: ACM Farm Service API
  description: API documentation for ACM Farm Service
  license:
    name: Apache 2.0
    url: https://springdoc.org
  version: 1.0.0
servers:
- url: http://localhost
  description: Generated server url
security:
- bearerAuth: []
tags:
- name: Address
  description: Address lookup and import operations
paths:
  /api/v1/plots/{id}:
    get:
      tags:
      - plot-controller
      operationId: getPlot
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePlotResponse"
    put:
      tags:
      - plot-controller
      operationId: updatePlot
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePlotResponse"
    delete:
      tags:
      - plot-controller
      operationId: deletePlot
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
  /api/v1/farms/{farmId}:
    get:
      tags:
      - farm-controller
      operationId: getFarmDetail
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFarmResponse"
    put:
      tags:
      - farm-controller
      operationId: updateFarm
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFarmResponse"
    delete:
      tags:
      - farm-controller
      operationId: deleteFarm
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/farms/{farmId}/certification/items/{itemId}:
    put:
      tags:
      - certification-controller
      operationId: updateItemStatus
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: itemId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCertificationItemRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/plots:
    get:
      tags:
      - plot-controller
      operationId: listAllPlots
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListPlotResponse"
    post:
      tags:
      - plot-controller
      operationId: createPlotForCurrentFarmer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePlotResponse"
  /api/v1/plots/bulk-geojson:
    post:
      tags:
      - plot-geo-json-controller
      operationId: getBulkPlotGeoJson
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/PlotGeoJsonDto"
  /api/v1/internal/plots/bulk:
    post:
      tags:
      - internal-plot-controller
      operationId: getBulkPlots
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/PlotInternalDto"
  /api/v1/internal/farms/batch:
    post:
      tags:
      - internal-farm-controller
      operationId: getFarmsByIds
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int32
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmSummaryDto"
  /api/v1/farms:
    get:
      tags:
      - farm-controller
      operationId: getMyFarms
      parameters:
      - name: keyword
        in: query
        required: false
        schema:
          type: string
      - name: active
        in: query
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseObject"
    post:
      tags:
      - farm-controller
      operationId: createFarm
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFarmResponse"
  /api/v1/farms/{farmId}/plots:
    get:
      tags:
      - plot-controller
      operationId: listPlotsByFarm
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListPlotResponse"
    post:
      tags:
      - plot-controller
      operationId: createPlot
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePlotResponse"
  /api/v1/farms/{farmId}/documents:
    get:
      tags:
      - farm-document-controller
      operationId: list
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFarmDocumentResponse"
    post:
      tags:
      - farm-document-controller
      operationId: create
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmDocumentCreateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseFarmDocumentResponse"
  /api/v1/farms/{farmId}/documents/upload:
    post:
      tags:
      - farm-document-controller
      operationId: upload
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/farms/{farmId}/certification/apply:
    post:
      tags:
      - certification-controller
      operationId: applyCertification
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseString"
  /api/v1/locations/wards:
    get:
      tags:
      - location-controller
      operationId: getWardsByProvince
      parameters:
      - name: provinceId
        in: query
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WardResponse"
  /api/v1/locations/provinces:
    get:
      tags:
      - location-controller
      operationId: getAllProvinces
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProvinceResponse"
  /api/v1/internal/users/{userId}/farms/ids:
    get:
      tags:
      - internal-plot-controller
      operationId: getFarmIdsByUserId
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: integer
                  format: int32
  /api/v1/internal/plots/{id}:
    get:
      tags:
      - internal-plot-controller
      operationId: getPlotInternal
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PlotInternalDto"
  /api/v1/internal/farms/{farmId}:
    get:
      tags:
      - internal-farm-controller
      operationId: getFarmDetail_1
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/FarmDetailDto"
  /api/v1/internal/farms/{farmId}/certification:
    get:
      tags:
      - internal-farm-controller
      operationId: getFarmCertification
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CertificationInfoDto"
  /api/v1/farms/{farmId}/documents/expiring:
    get:
      tags:
      - farm-document-controller
      operationId: expiring
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListFarmDocumentResponse"
  /api/v1/farms/{farmId}/certification:
    get:
      tags:
      - certification-controller
      operationId: getCertificationDetails
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseCertificationDetailsResponse"
  /api/v1/addresses/wards/{id}:
    get:
      tags:
      - Address
      summary: Get ward by ID
      description: Get a single ward by its ID
      operationId: getWard
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseWardResponse"
        "404":
          description: Ward not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseWardResponse"
  /api/v1/addresses/stats:
    get:
      tags:
      - Address
      summary: Get address statistics
      description: "Get count of countries, provinces, and wards"
      operationId: getStats
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseAddressStats"
  /api/v1/addresses/provinces:
    get:
      tags:
      - Address
      summary: List all provinces
      description: Get list of all provinces with optional filters
      operationId: listProvinces
      parameters:
      - name: keyword
        in: query
        description: Optional keyword to search by province name
        required: false
        schema:
          type: string
      - name: type
        in: query
        description: "Optional type filter: 'thanh-pho' (city) or 'tinh' (province)"
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListProvinceResponse"
  /api/v1/addresses/provinces/{provinceId}/wards:
    get:
      tags:
      - Address
      summary: List wards by province
      description: Get list of wards for a specific province
      operationId: listWardsByProvince
      parameters:
      - name: provinceId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: keyword
        in: query
        description: Optional keyword to search by ward name
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListWardResponse"
        "404":
          description: Province not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseListWardResponse"
  /api/v1/addresses/provinces/{id}:
    get:
      tags:
      - Address
      summary: Get province by ID
      description: Get a single province by its ID
      operationId: getProvince
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProvinceResponse"
        "404":
          description: Province not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseProvinceResponse"
  /api/v1/farms/{farmId}/documents/{id}:
    delete:
      tags:
      - farm-document-controller
      operationId: delete
      parameters:
      - name: farmId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
components:
  schemas:
    Coordinate:
      type: object
      properties:
        x:
          type: number
          format: double
        "y":
          type: number
          format: double
        z:
          type: number
          format: double
        valid:
          type: boolean
        m:
          type: number
          format: double
        coordinate:
          $ref: "#/components/schemas/Coordinate"
    CoordinateSequence:
      type: object
      properties:
        dimension:
          type: integer
          format: int32
        measures:
          type: integer
          format: int32
    CoordinateSequenceFactory:
      type: object
    Envelope:
      type: object
      properties:
        "null":
          type: boolean
        width:
          type: number
          format: double
        area:
          type: number
          format: double
        height:
          type: number
          format: double
        diameter:
          type: number
          format: double
        maxX:
          type: number
          format: double
        minX:
          type: number
          format: double
        maxY:
          type: number
          format: double
        minY:
          type: number
          format: double
    Geometry:
      type: object
      properties:
        envelope:
          $ref: "#/components/schemas/Geometry"
        factory:
          $ref: "#/components/schemas/GeometryFactory"
        userData:
          type: object
        length:
          type: number
          format: double
        empty:
          type: boolean
        valid:
          type: boolean
        simple:
          type: boolean
        precisionModel:
          $ref: "#/components/schemas/PrecisionModel"
        dimension:
          type: integer
          format: int32
        numGeometries:
          type: integer
          format: int32
        numPoints:
          type: integer
          format: int32
        boundary:
          $ref: "#/components/schemas/Geometry"
        interiorPoint:
          $ref: "#/components/schemas/Point"
        centroid:
          $ref: "#/components/schemas/Point"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        coordinate:
          $ref: "#/components/schemas/Coordinate"
        rectangle:
          type: boolean
        area:
          type: number
          format: double
        envelopeInternal:
          $ref: "#/components/schemas/Envelope"
        boundaryDimension:
          type: integer
          format: int32
        geometryType:
          type: string
        srid:
          type: integer
          format: int32
    GeometryFactory:
      type: object
      properties:
        precisionModel:
          $ref: "#/components/schemas/PrecisionModel"
        coordinateSequenceFactory:
          $ref: "#/components/schemas/CoordinateSequenceFactory"
        srid:
          type: integer
          format: int32
    LinearRing:
      type: object
      properties:
        envelope:
          $ref: "#/components/schemas/Geometry"
        factory:
          $ref: "#/components/schemas/GeometryFactory"
        userData:
          type: object
        closed:
          type: boolean
        boundaryDimension:
          type: integer
          format: int32
        geometryType:
          type: string
        length:
          type: number
          format: double
        empty:
          type: boolean
        dimension:
          type: integer
          format: int32
        endPoint:
          $ref: "#/components/schemas/Point"
        numPoints:
          type: integer
          format: int32
        boundary:
          $ref: "#/components/schemas/Geometry"
        startPoint:
          $ref: "#/components/schemas/Point"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        coordinate:
          $ref: "#/components/schemas/Coordinate"
        coordinateSequence:
          $ref: "#/components/schemas/CoordinateSequence"
        ring:
          type: boolean
        valid:
          type: boolean
        simple:
          type: boolean
        precisionModel:
          $ref: "#/components/schemas/PrecisionModel"
        numGeometries:
          type: integer
          format: int32
        interiorPoint:
          $ref: "#/components/schemas/Point"
        centroid:
          $ref: "#/components/schemas/Point"
        rectangle:
          type: boolean
        area:
          type: number
          format: double
        envelopeInternal:
          $ref: "#/components/schemas/Envelope"
        srid:
          type: integer
          format: int32
    PlotRequest:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        farmId:
          type: integer
          format: int32
        plotName:
          type: string
        area:
          type: number
          minimum: 0.0
        soilType:
          type: string
        boundaryGeoJson:
          type: string
        parentPlotId:
          type: integer
          format: int32
        polygon:
          $ref: "#/components/schemas/Polygon"
        status:
          type: string
          enum:
          - AVAILABLE
          - IN_USE
          - IDLE
          - FALLOW
          - MAINTENANCE
      required:
      - plotName
    Point:
      type: object
      properties:
        envelope:
          $ref: "#/components/schemas/Geometry"
        factory:
          $ref: "#/components/schemas/GeometryFactory"
        userData:
          type: object
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        empty:
          type: boolean
        simple:
          type: boolean
        "y":
          type: number
          format: double
        x:
          type: number
          format: double
        dimension:
          type: integer
          format: int32
        numPoints:
          type: integer
          format: int32
        boundary:
          $ref: "#/components/schemas/Geometry"
        coordinate:
          $ref: "#/components/schemas/Coordinate"
        coordinateSequence:
          $ref: "#/components/schemas/CoordinateSequence"
        boundaryDimension:
          type: integer
          format: int32
        geometryType:
          type: string
        length:
          type: number
          format: double
        valid:
          type: boolean
        precisionModel:
          $ref: "#/components/schemas/PrecisionModel"
        numGeometries:
          type: integer
          format: int32
        interiorPoint:
          $ref: "#/components/schemas/Point"
        centroid:
          $ref: "#/components/schemas/Point"
        rectangle:
          type: boolean
        area:
          type: number
          format: double
        envelopeInternal:
          $ref: "#/components/schemas/Envelope"
        srid:
          type: integer
          format: int32
    Polygon:
      type: object
      properties:
        envelope:
          $ref: "#/components/schemas/Geometry"
        factory:
          $ref: "#/components/schemas/GeometryFactory"
        userData:
          type: object
        length:
          type: number
          format: double
        empty:
          type: boolean
        dimension:
          type: integer
          format: int32
        exteriorRing:
          $ref: "#/components/schemas/LinearRing"
        numInteriorRing:
          type: integer
          format: int32
        numPoints:
          type: integer
          format: int32
        boundary:
          $ref: "#/components/schemas/Geometry"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Coordinate"
        coordinate:
          $ref: "#/components/schemas/Coordinate"
        rectangle:
          type: boolean
        area:
          type: number
          format: double
        boundaryDimension:
          type: integer
          format: int32
        geometryType:
          type: string
        valid:
          type: boolean
        simple:
          type: boolean
        precisionModel:
          $ref: "#/components/schemas/PrecisionModel"
        numGeometries:
          type: integer
          format: int32
        interiorPoint:
          $ref: "#/components/schemas/Point"
        centroid:
          $ref: "#/components/schemas/Point"
        envelopeInternal:
          $ref: "#/components/schemas/Envelope"
        srid:
          type: integer
          format: int32
    PrecisionModel:
      type: object
      properties:
        scale:
          type: number
          format: double
        type:
          $ref: "#/components/schemas/Type"
        floating:
          type: boolean
        offsetY:
          type: number
          format: double
        offsetX:
