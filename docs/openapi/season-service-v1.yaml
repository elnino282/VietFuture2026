components:
  schemas:
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
          minLength: 0
        description:
          type: string
          maxLength: 4000
          minLength: 0
        seasonId:
          type: integer
          format: int32
        plannedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        notes:
          type: string
          maxLength: 4000
          minLength: 0
        assigneeUserId:
          type: integer
          format: int64
      required:
      - title
    ApiResponseTaskResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          $ref: "#/components/schemas/TaskResponse"
        data:
          $ref: "#/components/schemas/TaskResponse"
        generatedAt:
          type: string
    TaskResponse:
      type: object
      properties:
        taskId:
          type: integer
          format: int32
        title:
          type: string
        description:
          type: string
        status:
          type: string
        plannedDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        actualStartDate:
          type: string
          format: date
        actualEndDate:
          type: string
          format: date
        notes:
          type: string
        seasonId:
          type: integer
          format: int32
        seasonName:
          type: string
        userId:
          type: integer
          format: int64
        userName:
          type: string
        plotId:
          type: integer
          format: int64
        workTeamId:
          type: integer
          format: int64
        estimatedDays:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
    UpdateSeasonRequest:
      type: object
      properties:
        seasonName:
          type: string
        startDate:
          type: string
          format: date
        varietyId:
          type: integer
          format: int32
        plannedHarvestDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        currentPlantCount:
          type: integer
          format: int32
          minimum: 1
        expectedYieldKg:
          type: number
        actualYieldKg:
          type: number
        notes:
          type: string
        description:
          type: string
      required:
      - currentPlantCount
      - endDate
      - seasonName
      - startDate
    ApiResponseSeasonDetailResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        result:
          $ref: "#/components/schemas/SeasonDetailResponse"
        data:
          $ref: "#/components/schemas/SeasonDetailResponse"
        generatedAt:
          type: string
    SeasonDetailResponse:
      type: object
      properties:
