  /api/v1/workspace/tasks:
    get:
      tags:
      - task-workspace-controller
      summary: List tasks
      description: List all tasks for current user with filters
      operationId: listTasks
      parameters:
      - name: status
        in: query
        description: Filter by status
        required: false
        schema:
          type: string
          enum:
          - PENDING
          - IN_PROGRESS
          - DONE
          - OVERDUE
          - CANCELLED
      - name: seasonId
        in: query
        description: Filter by season ID
        required: false
        schema:
          type: integer
          format: int32
      - name: q
        in: query
        description: Search by title (min 2 chars)
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number (0-based)
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      - name: sortBy
        in: query
        description: Sort by field
        required: false
        schema:
          type: string
          default: createdAt
      - name: sortDirection
        in: query
        description: Sort direction
        required: false
        schema:
          type: string
          default: desc
      responses:
        "200":
          description: Success
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePageResponseTaskResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiResponsePageResponseTaskResponse"
    post:
      tags:
      - task-workspace-controller
